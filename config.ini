# GoldSignalBot V1 – Configuration File
# Edit these settings to customize bot behavior.
# API keys should be stored in .env, NOT here.

[general]
# Output language for signals and console messages: en | fr
language = en

# Logging level: DEBUG | INFO | WARNING | ERROR
log_level = INFO

[data]
# Primary data source: goldapi | metalprice | yfinance
# Bot will automatically fall through to next source if primary fails.
primary_source = goldapi

# Timeframe for analysis: H4 (recommended for 1-2 signals/day)
# Supported: H1 | H4 | D1
timeframe = H4

# Number of historical candles to fetch for indicator calculation (minimum 50)
lookback_candles = 200

[strategy]
# Active strategy name (must match a class in strategies/ folder)
active_strategy = EMARSIATR

# Minimum Risk:Reward ratio (signals below this are discarded)
min_rr_ratio = 3.0

# ATR multiplier for Stop Loss calculation (SL = ATR * atr_sl_multiplier)
atr_sl_multiplier = 1.5

# RSI bounds for high-confidence zone
rsi_confidence_high_low = 30   ; RSI below this on SELL = higher confidence
rsi_confidence_high_high = 70  ; RSI above this on BUY = lower confidence (overbought)
rsi_confidence_low_low = 55    ; RSI in [55, 70] on BUY = high confidence (4-5)
rsi_confidence_low_high = 45   ; RSI in [30, 45] on SELL = high confidence (4-5)

[news_filter]
# Enable the economic calendar news filter
enabled = true

# Minutes before a high-impact event to block signals
block_before_minutes = 60

# Minutes after a high-impact event to block signals
block_after_minutes = 30

# If Finnhub is unreachable: strict = block signals | lenient = allow signals
fallback_mode = lenient

[loop]
# Scan interval in minutes (how often bot checks for new signals)
scan_interval_minutes = 15

# Maximum consecutive API errors before bot pauses for manual review
max_consecutive_errors = 5

# Wait seconds between retries on API error
retry_wait_seconds = 30

[backtest]
# Number of years of historical data to use for backtesting
history_years = 3

# Initial capital for backtest simulation (USD)
initial_capital = 1000.0

# Risk per trade as percentage of capital
risk_per_trade_pct = 1.0
