<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening MetaTrader 5...</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #fbbf24;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            background-color: #fbbf24;
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h1>Redirecting to MT5...</h1>
    <p id="status">Hang tight, opening your MetaTrader 5 app with the trade details.</p>
    <a id="fallback" href="#" class="btn" style="display:none;">Click if App doesn't open</a>

    <script>
        const params = new URLSearchParams(window.location.search);
        const action = params.get('action');
        const symbol = params.get('symbol') || 'XAUUSD';
        const sl = params.get('sl');
        const tp = params.get('tp');
        
        // Construct the custom protocol URI
        const mt5Link = `mt5://trading?action=${action}&symbol=${symbol}&stoploss=${sl}&takeprofit=${tp}`;
        
        const fallbackBtn = document.getElementById('fallback');
        fallbackBtn.href = mt5Link;

        // Try to redirect immediately
        window.location.href = mt5Link;

        // If we're still here after 1 second, show the fallback button
        setTimeout(() => {
            document.getElementById('status').innerText = "If the app didn't open automatically, please click the button below.";
            fallbackBtn.style.display = 'inline-block';
        }, 1500);
    </script>
</body>
</html>
